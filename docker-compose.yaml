services:
  backend:
    build:
      context: ./sysken-pay-backend
      dockerfile: Dockerfile
    container_name: sysken-pay-backend
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER:-user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-sysken_pay}
      - PORT=${PORT:-8080}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sysken-pay-net
    # 開発時にソースコードの変更を反映しやすくするためにマウント（ホットリロードにはAir等のツール導入が別途必要）
    volumes:
      - ./sysken-pay-backend:/go/app
      - go_modules:/go/pkg/mod

  frontend:
    build:
      context: ./sysken-pay-front
      dockerfile: Dockerfile
    container_name: sysken-pay-front
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:${PORT:-8080}/v1
    depends_on:
      - backend
    networks:
      - sysken-pay-net
    volumes:
      - ./sysken-pay-front:/app
      - /app/node_modules

  db:
    image: mysql:8.0
    container_name: sysken-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sysken_pay}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
      TZ: Asia/Tokyo
    ports:
      - "53306:3306"
    volumes:
      - ./sysken-pay-backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - sysken-pay-net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  sysken-pay-net:
    driver: bridge

volumes:
  mysql_data:
  go_modules:
